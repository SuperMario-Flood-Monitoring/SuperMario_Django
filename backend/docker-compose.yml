version: "2.4"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-supermario}"
      POSTGRES_USER: "${POSTGRES_USER:-supermario}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-supermario_local_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: "local"
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,172.30.1.51"
      DATABASE_ENGINE: "postgres"
      POSTGRES_DB: "${POSTGRES_DB:-supermario}"
      POSTGRES_USER: "${POSTGRES_USER:-supermario}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-supermario_local_password}"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://172.30.1.51:5173"
      CORS_ALLOW_CREDENTIALS: "true"
      SUPERMARIO_PUBLIC_BASE_URL: "http://127.0.0.1:5173"
      SUPERMARIO_API_BASE_URL: "http://127.0.0.1:8000/api"
      SUPERMARIO_LLM_BASE_URL: "http://127.0.0.1:8001/llm"
      SUPERMARIO_LLM_ANALYZE_URL: "http://127.0.0.1:8001/llm/analyze"
      SUPERMARIO_LLM_MAINTENANCE_LOG_URL: "http://127.0.0.1:8001/llm/maintenance/log/"
      SUPERMARIO_FORECAST_MINUTES: "10"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_data:/data

volumes:
  postgres_data:
  backend_data:
